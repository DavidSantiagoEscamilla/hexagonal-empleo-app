<VirtualHost *:8080>
    ServerName empleo.local
    DocumentRoot "/Users/usuario/Downloads/empleo-app/public"

    <Directory "/Users/usuario/Downloads/empleo-app/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "/opt/homebrew/var/log/httpd/empleo-app-error.log"
    CustomLog "/opt/homebrew/var/log/httpd/empleo-app-access.log" combined
</VirtualHost>
